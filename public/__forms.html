<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netlify Forms Fallback</title>
</head>
<body>
  <!-- This file is used by Netlify at build time to detect and register the form -->
  <form name="enquiry" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <input type="text" name="eventType" />
    <input type="date" name="date" />
    <input type="text" name="location" />
    <input type="text" name="guests" />
    <input type="text" name="package" />
    <textarea name="message"></textarea>
    <input name="bot-field" />
  </form>
</body>
</html>
